services:
  neonet-rendezvous:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-neonet-app}/neonet-rendezvous:latest
    container_name: neonet-rendezvous
    restart: unless-stopped
    ports:
      - "7777:7777/udp"
    volumes:
      - ./neonetconf:/data
    environment:
      - NEONET_PASSPHRASE=${NEONET_PASSPHRASE}
      - NEONET_LOG=${NEONET_LOG:-info}
