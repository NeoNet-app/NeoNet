services:
  neonet-relay:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-neonet-app}/neonet-relay:latest
    container_name: neonet-relay
    restart: unless-stopped
    ports:
      - "7777:7777/udp"
    volumes:
      - ./neonetconf:/data
    environment:
      - NEONET_PASSPHRASE=${NEONET_PASSPHRASE}
      - NEONET_DOMAIN=${NEONET_DOMAIN}
      - NEONET_RENDEZVOUS=${NEONET_RENDEZVOUS}
      - NEONET_LOG=${NEONET_LOG:-info}
